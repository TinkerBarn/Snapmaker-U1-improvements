[output_pin TOP_COVER_24V]
pin: PE15
value: 0
shutdown_value: 0

[gcode_macro TOP_COVER_LED_TOGGLE]
description: Toggles the Top Cover 24V pin on/off
gcode:
  {% if printer["output_pin TOP_COVER_24V"].value == 1 %}
    SET_PIN PIN=TOP_COVER_24V VALUE=0
    {action_respond_info("Top Cover: OFF")}
  {% else %}
    SET_PIN PIN=TOP_COVER_24V VALUE=1
    {action_respond_info("Top Cover: ON")}
  {% endif %}

[gcode_macro TOP_COVER_LED_ON]
description: Switch the Top Cover 24V pin on
gcode:
  SET_PIN PIN=TOP_COVER_24V VALUE=1

[gcode_macro TOP_COVER_LED_OFF]
description: Switch the Top Cover 24V pin off
gcode:
  SET_PIN PIN=TOP_COVER_24V VALUE=0
