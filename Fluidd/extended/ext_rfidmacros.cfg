[gcode_macro Filament_Update]
description: Read RFID Filamant tag (OpenRFID)
gcode:
    {% set s = params.S|default(0)|int %}
    FILAMENT_DT_UPDATE CHANNEL={s}

[gcode_macro Filament_Delete]
description: Delete RFID Filamant information (OpenRFID)
gcode:
    {% set s = params.S|default(0)|int %}
    FILAMENT_DT_CANCLE CHANNEL={s}

[gcode_macro Filament_Information]
description: Show RFID Filamant tag information (OpenRFID)
gcode:
    {% set s = params.S|default(0)|int %}
    FILAMENT_DT_QUERY CHANNEL={s}
